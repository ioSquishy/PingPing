# production log properties
writingthread      = true

level              = warn
level@pingping     = debug

writer1            = rolling file
writer1.format     = {class}.{method}() - {date}:\n {level}: {message|indent=4}
writer1.file       = /app/logs/log-{count}.txt
writer1.buffered   = true
writer.policies    = startup, size: 10mb
writer1.backups    = 2

writer2            = console
writer2.format     = {level} {class-name}.{method}(): {message-only|indent=4}
writer2.level      = info
writer2.buffered   = false

writer3            = application log
writer3.format     = {level} {class-name}.{method}(): {message|indent=4}
writer3.level      = error